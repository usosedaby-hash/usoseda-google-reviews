name: Collect Google reviews

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  collect-google-reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Collect Google reviews
        run: npm run collect

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: google-browser-debug
          path: |
            data/status.json
            data/google-reviews-asanaliyeva-25.json
            data/google-reviews-skryganova-39a.json
            debug/*.html
            debug/*.txt
            debug/*.png
          if-no-files-found: warn
          retention-days: 14

      - name: Commit review data
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Google reviews data
          file_pattern: data/status.json data/google-reviews-asanaliyeva-25.json data/google-reviews-skryganova-39a.json
